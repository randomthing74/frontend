<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Pasien | RehabSys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-layout">
    
    <!-- 🧭 SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-logo">⚕️</div>
            <h1>RehabSys</h1>
            <div class="brand-sub">Monitoring v1.0</div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="index.html" id="nav-home">
                <span class="nav-icon">🏠</span>
                <span>Home</span>
            </a>
            <a href="monitoring.html" class="active" id="nav-terapi">
                <span class="nav-icon">🎮</span>
                <span>Mulai Terapi</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <div class="connection-status">
                <span class="status-dot"></span>
                <span>System Online</span>
            </div>
        </div>
    </aside>

    <!-- 📄 MAIN CONTENT -->
    <main class="main-content">
        <div class="monitor-container">
            <div class="patient-info-header">
                <h2>📊 MONITORING PASIEN</h2>
                <div class="patient-details">
                    <div class="patient-detail-item">
                        <span class="detail-icon">👤</span>
                        <span class="detail-label">Nama:</span>
                        <span class="detail-value" id="displayNama">-</span>
                    </div>
                    <div class="patient-detail-item">
                        <span class="detail-icon">📅</span>
                        <span class="detail-label">Umur:</span>
                        <span class="detail-value" id="displayUmur">-</span>
                    </div>
                    <div class="patient-detail-item">
                        <span class="detail-icon">📍</span>
                        <span class="detail-label">Alamat:</span>
                        <span class="detail-value" id="displayAlamat">-</span>
                    </div>
                </div>
            </div>
            
            <div class="monitor-grid">
                <div class="monitor-box">
                    <h3>Sudut 1</h3>
                    <div id="sudut1">0°</div>
                </div>
                <div class="monitor-box">
                    <h3>Sudut 2</h3>
                    <div id="sudut2">0°</div>
                </div>
                <div class="monitor-box">
                    <h3>Sudut 3</h3>
                    <div id="sudut3">0°</div>
                </div>
                <div class="monitor-box ecg">
                    <h3>⚡ Sensor ECG</h3>
                    <canvas id="ecgCanvas" width="400" height="150"></canvas>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
  // Jika user belum isi form, jangan izinkan buka halaman monitoring
  if (!localStorage.getItem("formFilled")) {
    alert("⚠️ Harap isi data pasien terlebih dahulu!");
    window.location.href = "index.html";
  }
</script>
<script src="monitoring.js"></script>
</body>
</html>
